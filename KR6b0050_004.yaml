body:
  text: 宋涼洲沙門釋寶雲譯度五比丘品第十七敬順於佛意無差別吾愍汝等令離罪咎佛於世間普施以善以平等慈猶如赤子其有慢意侍是師者其人受𠎝如違慈父於是五人同聲對曰修甚苦勤無所剋致意退從安放恣其情何由致道願示其意猶如有人擊壓沙水唐勞其力終不得蘇譬人𤚼牛捨乳𤚼角以其行𠎝終不得乳緣燈光明以除晦冥亦不以水惡罵利刀如是厚重愚癡暗冥以智慧燈終不以餘猶如盛火得風吹動燒然乾薪終不休滅人縱情意迷惑六欲塵勞穢行終不損滅盛炎雖滅餘有少火終不捨本燒燋之性意雖精微故有餘識覺有識苦爾乃了諦當求無生無老無病又無有死地水火風無前無後無中無動思求是處覺滅度苦八賢聖路可以逮致是以覺道及其方便不以覺了八賢聖路故迷世間顛倒輪轉當覺是苦次相承侍先除苦原恩愛欲縛勤加剋修八賢聖路當以泥洹寂滅為證應覺覺苦除愛欲著以滅為證修聖路者因是立行其事具成吾當爾時逮覩黠眼明達四諦以是四諦為是五人三明解脫以堅金剛正法慧杵壞碎五人塵勞之山億寶始初覺正諦法八萬諸天時俱解脫地上天龍鬼神俱嘆轉上法輪何甚快哉善修禁戒輻甚牢緻調良寂滅輞博周匝精勤志介轂處中央為天人轉未轉之輪鬼神歎聲上衝于天周遍天上乃至梵宮諸天始得聞是音聲因是發意來詣佛所當其始轉正法輪時天龍人鬼海神皆喜即雨天花不可稱計衆生蒙賴從苦得安梵天請佛乞轉法輪衆生得度于今不息是之福報皆歸梵天是故稱號梵福第一其初始轉法輪之時佛以甘露先飲五人願使衆生速轉法輪如佛世尊説法度人佛本行經度寶稱品第十八久無央數劫所積得善本逮得昔所願先以授五人猶如事火祠得酥益增熾佛炎超踰彼光明靡不照已出五道淵尋便度五人始與五沙門德力勝五根佛如滿月現與諸弟子俱猶如五明星與月俱遊處時波羅奈城有大長者子性慈仁愍達厥名曰寶稱居宅如天宮侍使猶天女伎樂小罷息稱及女皆眠古世福所追應服甘露藥前世見死尸慈悲斯須間宿善所追及悵然從寐寤見諸女如尸居宅猶丘墓其心懷慘忤舉手悲歎曰吾今遭厄難大苦患之中自然生善心唯樂無為安欲樂難久保善樂斯須耳當從何路逃於何自藏匿不遭無常火無恐怖之處誰於世可恃吾當何所怙誰當從愛欲深泥中見拔於是捨愛欲徐下金寶床因便履寶屣其價直百千居宅城門戶皆自然夜開即明曉如晝其心懷狐疑天於上空中懷慈告令悅仁遠建志性莫顧懈遲久佛世間聖師今去是不遠停立相望待如牛求母犢仁當於今日建無極大利淫欲如群魚迷惑之回波以乘上精進第一牢桴材度諸苦淵海期必在今日時童子寶稱行正流泣測遙舉手向佛悲聲而歎曰惟尊我今困於老病死苦願尊常為歸濟我斯苦患佛時遙告以梵柔軟淨音是間有安靜無苦患之處有八賢聖路寂滅甚清涼速來詣吾所當為汝作歸寶稱聞是教喜踊意充益猶如遭旱熱自洗清淨池尋聲至佛所稽首世尊足唯如妙華樹為風所吹顛體瓔珞服飾心怛然不著宿福今運會畢竟獲羅漢佛見寶稱心內慚體瓔珞沙門事俱辨因告語之曰飾容內純善第一勝諸根是謂成吾法不以託外服其有內心端表裏相應順道門為之開不可恃虛服緣寶稱功德四友因得度滿成與無怙牛呞及善與將五十童子得度脫諸苦彼諸世尊邊始六十羅漢時佛以梵音告諸弟子曰汝等已度苦曠然清涼安衆生沈愛欲受苦可憐傷卿等宜慈愍諸方宣化度分布遣弟子於是獨遊行乃至野象澤因求止宿處現神光晃昱以降毒害龍顯神足變化種種奇妙好佛憍慢已盡又化諸憍慢度第一迦葉居野象澤者然後以次度迦葉之二弟三兄弟門徒千人成無著佛與是三人功德甚巍巍法則及惠施禁戒威儀善將從千弟子名衆師之師慈愍度竭王行詣王舍城有宿德之人典領摩竭境以善居王位德善踰衆生聞佛大聖尊來入國境內聞即心喜踊整嚴往迎佛王駕躬自出與大極自軍王瓶沙妙容衆王中最殊如釋從諸天俱出其天宮嚴威儀導從往見梵天時與諸重臣屬始從城中出執轉輪聖王出遊之威儀與諸神寶臣前後俱導從極世之嚴飾殊妙無有比象馬車人從聲震於雲中婦女臨路觀服飾如電曜諸城門各出填塞四衢路猶如山諸谷秋雨暴水出諸王中雄猛行近至佛前佛奮金色光照曜諸樹間以佛之威神曜澤令金色王愕然歡喜顧謂傍臣曰聽聲視其色禮儀甚相應如吾諦熟觀誠實妙寶器智慧之大海衆善之寶藏遙視其容貌佛以慈相示王不勝歡喜便下其寶車如日出於雲下沒西山岡罷王五威儀步進詣佛所五體禮佛足盡心謙恭敬叉手仰視佛甚妙意無厭喜敬心無量身衣毛皆竪禮竟就位坐形容益殊好一心熟觀佛猶寶須彌山三自稱名號因白世尊曰今視世尊顏心終無厭足佛興世奇快為三界作歸今日喜踊躍情懷心逸豫豫覩計明諦快捨聖王位天世人所敬其宜實應當度身至安處充滿衆生願今禮世尊足身命歸於佛王於佛前坐僉然自撿整繫眼睛於佛熟視心不動專精在守意如蜂向花樹兼加謙恪心渴仰欲聞經佛以八種聲為王廣説法諸根及心意六情緣起色起滅不停息猶如水中泡諸根之起滅王當諦覺知如下種於地必有萌芽生芽非種種非芽王當審覺非本不離本諸情意如是生死之顛倒相因緣生滅王聞是深法心為之悚然即度生死淵逮得慧眼淨侍從萬二千皆蒙得解脫上諸天八萬逮得甘露藥爾時佛聖師遊止竹林園慈愍衆生故晝夜奮光明比丘名馬師順威儀早起啓辭白世尊欲入城分衛佛告今出行若卒逢異學當以四諦頌次第為解説時聞聖師教頂受而奉承為其四大故行詣王舍城寂然息心行目視不離前外學甚明達厥名曰受訓見妙異威儀敬心而往問新威儀寂滅唯告示其意是何奇寶山為仁最上師仁是何寶顆從何山迸出是何智慧樹所戴鮮好花為從何師日仁光所從出是何慧清池乃生是芙蓉仁師有何教是誰見告示有王甘蔗族釋種王之子捨家學成佛為普世聖師仁當覺吾師天人聖賢師我適始初學生年既幼稚佛法廣且深所説甚精微今當精現説聖師之言教覺苦苦起無又知苦所滅所以苦滅道聖師所頒宣彼聞是四句心即霍停止憂婆替即時逮得慧眼淨因為目犍連再遍説四句應時見道迹俱行詣佛所與五百門徒稽首敬禮佛發聲稱沙門威儀即備悉二賢先見道俱逮羅漢果一者智慧最二者神足備二賢侍世尊猶如左右臂共輔翼於佛如王者賢臣時有大姓子名曰藥樹生捨金色妙英剃頭被袈裟於多子野澤見佛陳本行今始得覩佛一切智聖師叉手戴頂上向佛遙稽首佛是我聖師我是佛弟子佛以妙梵音慈心告之曰善來賢明士適遇會良時佛應順本行為説深妙法散其塵勞聚即時逮果證與三聖弟子光顯一切智猶月十五日與三明星俱適從舍衛國奉使至王舍財富好施與厥名曰須達到適聞佛名喜踊躍無量舉身衣毛竪夜不能眠寐夜半至佛所到即得見佛五體禮佛足情甚懷歡欣汝以愛法故除損睡眠耶夜喜故詣吾必獲其善報施戒及智慧歎譽生天安淫欲之瑕穢廣説若干法猶如淨好㲲入染受色鮮時長者須達受入泥洹池久發願求佛欲於世興出度脫衆生苦所誓今已滿從生死苦厄度無數衆生導以正平路徑趣泥洹城如其本所願各各從意得往古得度者盡服甘露味皆尋得安隱不危墜之處聞已樂學者當入泥洹城佛本行經廣度品第十九獨為一切護獨為世間師為天人為導號佛天中天長夜在塵勞久處昏眠者擊正法之鼓以寤所應度五嶽所擁繞羅閲祇城中度王弟攦黑及群衆八萬長者號勇猛慳垢蔽其目先濟化炎光并度醫耆域王舍城國內迦羅衛首家世尊光踰日小火欲焚佛法雨洗其心三垢之盛火毒飯及塵冥一時普消殄隨提大國中達士如梵天度名聞梵志號曰梵摩踰香特大國王目如紺蓮葉為解六種法令覺正見諦有山名道術特顯如金山心淨有智慧沐浴俗解脫有十六梵志號曰度彼岸及餘六萬人同時皆得道時衆祐福田往詣處聚中於時彼聚中有大姓梵志有名聞重齒時欲大祠祀斷祠祀疑網立之於正路時在隨提山帝釋石室中時佛處其中不動如太山天樂般遮翼歌頌覺寤佛以清淨甘露飲天王帝釋懷害多瞋怒捷疾甚暴風小指為額鬘迷惑癡狂走害如閻羅王梵志鴦掘魔神足以調化凶暴難調者又於安屈界梵志名戒慎狐疑所纏結絶斷其狐疑與三百門徒從苦得解脫截其塵勞結令永無有餘頭上火炎然口中亦吐火瞋怒銜下脣撩擲火燒然身都放火炎猶如劫盡燒以言滅曠野阿臘鬼神火身大如青雲電光晃斑駁體大亦如是飾以金瓔珞懷害吐毒氣霹靂雹石緻視神力斯須滅無苗龍毒於大宅聚中化童子拜守先度善昏眠野城化手授拘睒尼所濟無畏及令者於羅閲城國化梵志無嫌維耶離所度食肉蔽羅剎葉耳惡鬼神俱化令度脫師子力已下化度四千人又化劫賓䨲及四千童子於野畜繁山化太子道德地時度白轉所生化濟使退守於雙林生聽於舍衛化梵志無畏及無數大衆又化優波先五百將從俱又度聽受等及五百梵志化不蘭弟子有五百賈人濟五百釋種皆令作沙門於清林村落化度二百人無特度二百會同度五百又於億傳村化度八十人此滿度六百隨提聚五十諸天四天王大力護世間勢力如谷水恚害如流波以其越呪教為説四聖諦極乃能解達立之八正路諸賢士等輩二十八鬼神將軍凶弊惡犯嬈人魂魄居雪山鬼神竪毛多瞋怒刺毛甚弊惡佛滅其恚害女神諸鬼母厥名曰取去食世間無數嬰孩抱上子最小子愛作佛取藏鉢覆母行方便求狂走來詣佛佛問愛子耶世人亦愛子若能慈不殺吾當示汝子即從教受戒執慈不復殺與子歸詣佛如江河歸海將男女甚多鬼男女亦衆孫息諸男女無數塞野澤於祇樹之中化諸鬼子母將從無數衆佛授以正法隨提國沙門度脫四十人四方士沙門又度三百人度簇髮梵志徒黨四千人有勇進梵志又復度千人如化舍利弗精進者無數以化槃特法軟意教亦爾又如安庠法化無數善人化羅旬擩法度諸薄福者如化賢良法度無數貴人以化廁士方度無數賤人如化迦葉術度無數調良如化迦樓陀無數放逸人如化善除法所度無央數以化貴姓法聚度亦無數因度占波法度諸占相師如迦葉比類化曉迎意者舍衛城門中逢五百異學化以火圍繞方便度脫之現神足變化度鬱鞞迦葉以威神降伏梵志名快諦審諦與阿踐及無苗龍王并言談長者皆急疾力化或如鴦掘魔捨走而以化如化香持王迎逆煩意度以若干方便接度其弟難度梵志因頭佛從因化出變現身為鹿濟度野獵師五百釋種獵化其箭為花化醉如郁伽度嚴飾如綵以度憍悵方濟諸奢憍者化難動迦葉逆不受其施以若干方便行調度衆生長齒與黑子吉瓶及造作諸國弊鬼神佛之所教化上升及深奧江施與形像至牢山鬼神化於普廣山度明珠齒鬼花齒鬼第二千目及青眼法度與赤色嬰耳及花耳大力甚貢高大深山谷中化是諸鬼神佛至大吼國度諸優婆塞立之不還道凡有百五十建往還道者有二百五十須陀洹道者具滿五百人所向及喜嘆嘆者樂花開聽善性及霧吉善來充溢稱滿及善覺仲隱光含笑牛勝潔長頸未發并泉作如是等羅漢同一有五百略説其端首度者無央數或以柔軟教或以粗獷辭或以剛柔調佛盡教化之調達之所放狂醉於王舍佛所化迷惑醉象名財守時於城門外佛見猛師子好目視世尊佛記當得佛於帝釋石室降化猛特牛曠野中諸應為下生天種時不具城中兩初生虎子得慈心於佛及與千飛鳥鸚鵡及孔雀豺犳并維羅龜鱉與毒蛇鸜鵒及奢立鴿雀及與烏乃及至蝦蟇是等蒙恃怙皆得生天上裸形入海水可浮得彼岸日有千光明可以手掌障佛諸經深義廣博微妙句一切諸聖師莫有能究盡無數諸天樂無量諸聖神無邊空中露無底山地祇無數水樹神無數地天人所度無央數先世所願具猶佛得願具衆聖天人師亦充天世人所求之善願亦願使一切有形衆生類其學是經者令入泥洹城諸天執樂神龍鬼阿須倫是等聞佛經逮服甘露藥見佛受化者世間今故有是等護國土災患永消亡佛本行經現大神變品第二十諸天之帝與諸天俱已勝強怨諸阿須倫名稱力勢普增遠聞坐施安床心喜無量以微妙法甘露神藥天人之尊甚自充飽猶如天帝處施安床梵志見佛安坐如是心不歡喜不得休息因生嫉妬懷煩鬱熱因相聚會於林樹間廣共博義論説於佛此人何因獨顯於世其名聽遠超吾等上及將世人入邪徑路令梵志法轉見輕慢若其名德轉久增益吾等名稱便當滅亡吾等名稱若滅亡者何從能致供養安樂故當勤加推理思求釋種之子獨得敬養若能推盡反其事者了必當失供養名稱各各思惟欲露佛短或有發聲反歎顏貌或復稱其言辭清淨又復嘆詠其相好者如是言語斑駁不同乃反稱揚佛之功德於時其中有大梵志謂衆人曰聽吾言理母生之時從右脅出其母永無瘡痍疾苦難動大地六反肅震微妙天樂自然有聲空中自然雨諸天花金粟銀粟盤檀種種于時日光踰倍於常花下猶如雜綵帳幔諸天撞擊寶鐘金鼓慶雲含潤如垂降澤日月燈燭皆失精光普世欣喜如得恃怙生於微妙林樹之間從脅生時猶日出雲未及下至於地之頃天帝掌接傾側恭敬子出生時顯露如是奇瑞可怪不可思議天地為之感動證應自是普世將護名稱少小勤求解脫度世塵勞之穢蛇蚖毒害正應登臨轉輪王位捨棄不顧勤求滅度不迷惑於少壯之惑念老病死傷損其情捨家入林息心淨行名稱之美熟復踰此其弟子衆賢良調善以是之故得世敬養迦葉目連及舍利弗是等屈就余敢不從三王捨棄美號王位執持沙門微妙威儀其餘無數賢善貴人歸釋種子訓化言教佛於世間所得諧偶或因弟子或以己聽宜設方便早屈折之如惡病王思惟除滅曼今吾等瑕醜未現人未覺寤簇髮重戴亦𠼦未笑灰塗身體裸露五形如是禮節現子所為不可得勝以其辨口託諸言説巧便精勇及於無畏豐秋賢善并與迦葉厥性質直名曰審諦身體妙挺巍巍可畏所學聰疾明達踰師視世學人猶如草穢又自矜高意常求敵言辭臨衆譬如醉客得至釋子皆沈著地自居如象過猛師子吾唯一事可以勝之偏當以此得伏子耳若能爾時必得勝子名稱可畏又增利養唯可請佛令現神變子性少求又喜慚愧每敕弟子不現神足若不現變則負吾等聞是皆喜還相歎譽已各罷散各寓廬窟魔天其夜詣諸異學欲以威神令意喜悅各各一一至其廬窟自變形容如其弟子自投其身不蘭足下我真實是聖師弟子又復往至餘五人所遍往行詣欺誑六人以其神足令各愕然梵志歡喜謂必果勝諸梵志等各各早起大相聚合到王宮門詣王耳目明司之官具各陳情使入啓王是諸梵志大婆羅門或所長養智慧宿年今來詣門求見大王如天仙士詣帝釋門王曰吾聞是諸梵志欲與佛競顯己功德嫉惡於佛善德相好如阿須倫嫉月之明臣下白王是等群聚長聲嚮嚮求敵欲鬪猶如熊羆特牛虎象如為師子見遮深谷王即聽使諸梵志現坐席承望敬以容禮慈意瞻視遜辭與語諸師何故勞體顧意諸梵志等各舉右手同聲發聲啓白天王智達慧人應馳省王如天仙士謁現梵天梵志立王唯以一法在於世間詣明人事唯以稱量是法非法立王者位如稱度量自昔以來未曾聞見上世之時猶不如是視諸梵志衆善功德如於王國受供養福願聽其意來之意故今盡微願啓白天王今欲與此瞿曇沙門俱於王前捔神足力願躬臨視大智慧者有大神力功德勝者然後乃可諦覺了知其得勝者王請為師王良久乃謂諸梵志賢明競爭理所不安金初不曾還與金爭是故賢明不當爭競於是梵志重復白王願王聽省某等所因不復開避某等徑路於己善法勞勤志思捨棄舊典所居廬窟又復叛棄梵志先師突走歸趣瞿曇法律猶如海水入摩竭口託是事理及餘無數以諸言辭切逼迫王王因一視左右傍臣便以此事付梨師達時梨師達遜辭謂言今説一事唯各善聽賢以善意捫摸瘡痍以軟滑篦耗盡病原師子虎狼毒害蝮虺值其睡眠智者不覺佛今坐定入禪寂滅仁等不宜無事覺悟猶如烏鵲與金鳥諍牛迹之水與海捔量螢火蟲子與日光明田家灰堆欲比須彌求欲與日力競光明又欲與月比其盛滿欲與帝釋共相照曜又請梵天示現神足下賤之類若餓鬼來與諸上尊欲捔神力汝等請佛亦復如是何智達者當信是事仁等今餘所有弟子善自防護於釋種子如摩竭魚久睡眠時不可覺言起來吞我時王聽受梵志所啓王前下期却後七日王便輕出往行見佛具向世尊陳説此事我於尊法終無厭足聽受世尊微妙正典貪衆善意無有斷絶今諦思惟世尊德善尊無數劫積行如流今世功德充滿如海猶如晝夜興大雲雨新水入海充盈滿實佛世尊之無量巨海梵志等見洪滿盈溢便欲以手接取灑棄灑棄巨海欲令枯竭梵志等期會祇樹園却後七日捔神足力其已許可此等所啓是輩與我已結要誓退忘不失啓白世尊愚情有失愆重如何王體素自粗丁姝大歎佛威德悚然細小世尊弟子名曰目連長跪叉手前白佛言佛天中天衆聖之師願默寂然是事見付薄能挫折此外異學猶金翅鳥臨海諸龍佛以梵音而告之曰斯等請吾吾宜往應王聞佛許歡喜踊躍因顯發聲説是言曰地上諸人及虛空中天龍鬼神聽吾言令種種展轉必相告語天上空中大山巨海相請來會觀名稱德必來莫疑普世衆會於是斯會七日已至於祇樹間徵瑞應現以衆香汁沐浴灌灑若干色花遍布其地可見之類於空中現諸天營從與諸天女諸妙寶樹於空中現衆寶幡幢如舌舐空蓋拂垂珠而雜種香諸天瓔珞花鬘轉目衆寶積聚處處顯現諸天名寶側塞空中天上世間莫不踊躍故集會來觀神變現諸天人聚猶如大海譬如秋水趣於海淵爾時有天名曰稱令觀諸無間普懷歡喜從天下來稽首佛足執恭敬意白世尊曰我今特當殊異於餘勤加奉事於佛世尊若有先時以善施人彼則加報迎之以善世尊普慈加於世間以次為之衆生恃怙如今觀察佛天中天出興於世獨為我故自惟我兄大國之王己身前世行善惡事緣是更歷大艱難中如從天上墮於地獄割我兩臂乃到曲肘兩腳見截乃至于膝猶如屠兒屠羊之法解我支節令各解散世尊爾時來受我師緣佛世尊更受生命時佛為我説微妙法尋還建立阿那含證我獨一己能勝異學以神足力壓伏外道世尊躬自難其弟子以一切智或能預知今當承事小加勞苦乃後來世以為念事梵志後時聞是言論便不敢復求捔神力以己神足忽然升虛斯須之間到雪山中於深溪谷見其好樹天香衆寶甚嚴微妙拔取大樹周匝由延以手擎持猶如寶蓋時一切智寶座之側時諸天人以雜天繒挍飾寶樹甚可愛樂於時便出無量光明譬如雲除日霍然現紫金色炎白銀色光其光昱昱普曜世間自然芙蓉從地中現千葉蓮花天雜寶成妙紺琉璃以為花莖象牙高座在蓮花上天金花臺細明珠茸為佛施主極妙無比時佛徐行就天寶座處於花上如梵天王佛身光明踰倍於前日月明珠不可為比奮放臂光照曜世間一切智燈明輝於世猶如蓮花塵水不著衆生視佛周匝圍繞如蜂集花而食其精熟視佛面而無厭足遣使往請外道諸師意疑不欲來就衆會時佛告語諸天人曰是等不來至此共會於時神通一切聖智衆生緣畢應得度者即以佛眼覩察十方欲從生死廣度衆生地即劈裂獄苦盡現如大張口欲吞世間衆生恐怖心懷戰栗如船賈客遭摩竭口時佛呼告大目犍連敕語衆生諸地獄名是痛如此此苦如是犯是瑕惡墮是地獄目連升虛奮洪聲令遍十八獄説其罪對時衆生各識本所作我應墮此我應生此一切衆生心盡向佛餘無可怙唯歸三尊衆生心專一向不動悚息縛束爾乃現變於佛寶座四角化現角有四佛坐寶蓮花因是轉變無數諸佛坐寶蓮花塞滿虛空諸佛光明照曜十方身或出水如雲中雨或復變現水火俱出滿虛空中化現如是時佛奮現如是神變至二十八無結愛天諸佛充滿三千世界衆生遠近見佛所在諸佛世尊坐蓮花上光明神德一切具足功德巍巍猶如寶山四嚴嚴飾光曜於世如梵天王花中出時坐蓮花上威儀備悉唯佛世尊降伏魔兵坐蓮花上德超梵天一切衆生展轉相謂劫數若干百千萬億無央數劫所積聚德一切智藏今日乃發猶如往古劫初之時四生衆生從梵口出佛今所現如古梵天世尊口出無央數佛自古已來衆生懷念謂此世界唯有一佛蒙佛光明長養衆善無央數佛世所恃怙佛之大燈然於世間光明徹照三界衆生世間無復愚癡之冥一切智明愚癡除無紺色光明晃深虛空坐於千葉寶蓮花上佛現福報滿是世界猶如大海七寶充盈佛現衆會皆懷善心即以深奧柔軟清淨梵哀鸞音以種種聲廣為衆生説微妙法如是三界無常無堅無我苦空滅無為安佛説如是深要法時聲遍流聞三千世界有億衆生發大道意又餘無數發緣覺乘復億衆生逮得道迹諸外異學捨外邪見時佛即便還捨威神於衆生前顯然升天於忉利宮為母説法以甘露藥飲諸天人佛所以得勝諸梵志神足變化威德相好充滿一切衆生之願普同淨潔甘露法藥汝今在此現大神變化度無量無數衆生其諸天神逮見佛者念佛恩德擁護世間其聞是者增益功德緣是種善於佛福田得度生死苦惱之對因入泥洹安樂之城轉法輪品第十七願成懷歡喜悅澤樹王下坐觀樹七日不食喜充盈猶王初臨國巡行妙寶藏佛妙藏亦爾先觀視諸法以佛眼普視世間悉了見覺世行入邪六師迷惑説法微妙難解愚了泥洹解覺第一最覺意欲默然寂最神妙梵天方便見無偏知佛先世誓發心欲來下欲以善益世妙辭請法雨被㲲明如日顯然降世間尋來到佛前敬稽首佛足在佛側甚明如風吹金樹慈目視無厭盡敬白佛言願憶果敢誓施甘露於世世人如藕華微妙好或齊水敷或出水上衆生欽仰佛日當出蒙日心開猶池中華捨佛世尊無誰能有從生死獄拔出衆生猶如往古轉輪聖王濟衆生苦以十善行已能托攪智慧海淵得上神良甘露法藥欲以充滿衆生疾苦宜開惠施分甘露藥尊已得度衆苦海淵願以法船度一切生猶如賈客沈沒海中方便濟度如巧船師塵勞之疾甚重弊惡衆生久患不遇良醫最上醫王興出于世今宜授與法神良藥想煙如雲覆蓋甚厚淫火熾燒諸天世人尊已飽滿宜傷衆生願以法水充飽一切已能滅除一切愚冥心明智慧喻如大燈愚冥覆蔽世間之眼願施法燈照曜愚心尊已服飲先佛口教言辭之江猶先仙人願從妙口慈哀惠捨清淨言辭恆水江河貢高慢山巖甚峻高以慧剛杵碎令無餘願復以此智慧法杵施與衆生令碎慢山心性躁擾今已調良縛以審諦智慧之繩願施世間清淨調意智慧牢固索之繫縛慈仁之主施惠慈心衆生久遠墮邪徑路世間導師今已出興願導世間生死曠野迦葉佛來世皆昏寐沈沒迷惑塵勞長夜惟願世尊宜以正法之大鐘鼓覺寤久眠世間梵尊受許梵天淨音微妙當班宣法梵天聞之甚大歡喜禮佛足已忽升虛逝於是衆善第一法器號曰世間功德福田佛應普受衆生之施四王即來奉獻四鉢佛即時以神變之力左受右按合成一器於是便受二賈客施始受五戒為清信士因是發意當廣説法佛眼始視應得度者阿蘭命過已至七日見鬱陀羅昨夜命終因復憶念侍者五人欲為是等除長夜冥行詣大城波羅奈界威儀安庠猶師子步所作已辦相好甚著厥雖獨行德如衆從有一達士名曰尼揵於路逢之意用愕然占相變夢逆知吉凶八種世典名稱獨舉見佛德相審諦觀視謙遜恭敬軟辭白佛諸染著中而無所著諸根動中寂無所動瞻覩面相於情有疑將無智慧明達具足熟視面相清徹明好牽御諸根所為自在觀察儀容所作事辦師為是誰願為誠告時佛告以清淨之聲天上世間吾無有師吾不詣師自然覺之吾證佛滅卿當了之自稱為佛已普勝邪如是尼揵應覺已覺一切可勝都已得勝以是勝故成一切智今始行詣波羅奈城吾欲於彼擊大法鼓為世苦惱建置善法普請令會法之上賓獨安己身是不為奇濟拔勤勞一身苦者廣為衆生而求善者其人功德不可計量若以一身度流上岸若復見人為水所漂不發慈心濟水流人是輩不可稱為道士若復有得伏藏珍寶不惠濟貧是不可爾手持良藥行瞻病人不以濟病齎之何益若見迷人行失路者不示正路不名大道若復見人為蛇所螫不與其呪用此人為若自然燈有所照見是不可以置恩於此佛以慈善教化一切為人説法不以貢高木中可保必審有火空中有風地中有水如是諸佛必有聖道道樹下得波羅奈説即時歎吒甚妙無比尼揵歎已順道而逝心懷喜行數數顧瞻慈目視佛而無厭足佛順道行至波羅奈翔鳥所樂鹿野之園光相晃昱明曜於世猶日天子入迷惑園億寶意好邊方第三第四馬氏第五賢居爾時五人遙見佛來還共論議而相謂言樂義者來是瞿曇子退失本志術敗不成不足起迎亦莫禮待本誓已壞不宜恭敬如是要已急坐不起語言之頃佛即來至忽不自覺違其本要猶如地神擎持令起或有迎接攝取衣者又有取鉢設座席者以如是像承敬奉佛猶不能捨世俗戲言佛因告曰非道士宜佛前不宜慢無恭肅
